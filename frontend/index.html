<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menú Digital - Rincón de Rango</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="shared/menu.css" />
</head>
<body>
  <header id="header"></header>

  <main class="container py-4 menu-main">

    <!-- HERO -->
    <section class="mb-4">
      <p class="menu-eyebrow">Menú digital</p>
      <h1 class="menu-title">Nuestros platos</h1>
      <p class="text-secondary">
        Explora las categorías y revisa el precio y la descripción de cada producto disponible.
      </p>
    </section>

    <!-- ESTADO DE CARGA -->
    <div id="menu-status" class="alert alert-secondary text-center">
      Cargando menú...
    </div>

    <!-- CONTENEDOR DE CATEGORÍAS -->
    <section id="categorias-container" class="d-flex flex-column gap-5"></section>

    <!-- SIN RESULTADOS -->
    <div id="search-no-results" class="alert alert-warning text-center hidden">
      <i class="fa-solid fa-circle-info me-2"></i>
      No se encontraron productos con ese nombre.
    </div>

  </main>

  <!-- MODAL DE DETALLE -->
  <div id="product-modal" class="modal fade" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content border-0 overflow-hidden">
        <div class="row g-0">

          <!-- Imagen -->
          <div class="col-md-5 d-flex align-items-center justify-content-center bg-light p-3">
            <img id="modal-img" src="" alt="" class="img-fluid rounded" style="max-height:320px; object-fit:contain;" />
          </div>

          <!-- Info -->
          <div class="col-md-7">
            <div class="modal-header border-0 pb-0">
              <div>
                <span id="modal-category" class="badge menu-badge mb-2"></span>
                <h5 id="modal-title" class="modal-title menu-color fw-bold"></h5>
              </div>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>

            <div class="modal-body pt-2">
              <p id="modal-description" class="text-secondary"></p>
              <p id="modal-price" class="fw-bold fs-4 menu-color"></p>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <footer id="footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="shared/header.js"></script>
  <script src="shared/footer.js"></script>
  <script src="cliente/menu.js"></script>
</body>
</html>
