<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>EcoMarket - Página Principal</title>

      <!-- ESTA LÍNEA ES PARA LOS ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>
<header>
        <img src="img/logo-rdr-madera.webp" alt="Logo" class="logo" width="120px">

        <div class="categoria">
            <select name="categorias" id="categorias">
                <option value="categoria">Categorías</option>
            </select>
        </div>

        <div class="buscador">
            <input type="text" id="input-buscar" placeholder="Buscar frutas, verduras y más...">
            <button type="submit">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>  
        </div>

        <div class="cuenta">
        <button type="submit" id="loginInicial">
            <i class="fa-solid fa-user"></i>
        </button>
        </div>

    </header>

    <main>

        <!--Sección de sopas-->
    <div class="container" id="sopas">
        <h1>Sopas</h1>

    <div class="opciones" id="opciones-sopas"></div>
        
    </div>

        <!--Sección de entradas-->
    <div class="container" id="entradas">

        <h1>Entradas</h1>

        <div class="opciones" id="opciones-entradas"></div>
    </div>

        <!--Sección de platos de fondo-->
    <div class="container" id="platos-fondo">

        <h1>Platos de Fondo</h1>

    <div class="opciones" id="opciones-platos-fondo"></div>
        
    </div>

      <!-- Mensaje para búsqueda sin resultados -->
        <div id="search-no-results" class="no-results" style="display: none;">
            <h2>No se encontraron resultados para tu búsqueda.</h2>
        </div>

    </main>

     <!-- ======== MODAL DE DETALLES DEL PRODUCTO (OCULTO) ======== -->
    <div id="product-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button class="modal-close-btn">&times;</button>
            <img id="modal-img" src="" alt="Imagen del producto">
            <h2 id="modal-title"></h2>
            <p id="modal-description"></p>
            <p id="modal-price" class="modal-price"></p>
        </div>
    </div>

    <script src="js/app.js"></script>

    <footer id="footer"></footer>
     
<script src="../../shared/footer.js"></script>

</body>
</html>
