<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Registro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Tu CSS -->
    <link rel="stylesheet" href="../editar-datos.css">
</head>

<body>

    <div class="editar-wrapper">

        <!-- ENCABEZADO -->
        <div class="editar-header">
            <a href="dashboard-product.html" class="btn-volver">
                <i class="fa-solid fa-arrow-left"></i> Volver
            </a>
            <div>
                <h4 class="editar-titulo" id="editar-titulo">Editar Registro</h4>
                <!-- El subtítulo se llena con JS: "Tabla: Producto | ID: 3" -->
                <p class="editar-subtitulo" id="editar-subtitulo">Cargando datos...</p>
            </div>
        </div>
    
        <!-- FORMULARIO -->
        <div class="editar-card">
            <form id="form-editar">

                <!-- ============================================================
                     SECCIÓN: PRODUCTO
                     Se muestra/oculta según la tabla seleccionada
                     ============================================================ -->
                <div id="seccion-producto">
                    <div class="seccion-titulo">
                        <i class="fa-solid fa-box me-2"></i> Datos del Producto
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre del producto</label>
                            <input type="text" class="form-control" id="campo-nombreProducto"
                                placeholder="Nombre del producto">
                        </div>
                        <!-- Reemplaza el input de categoría por esto -->
                        <div class="col-md-6">
                            <label class="form-label">Categoría</label>
                            <select class="form-select" id="campo-categoria">
                                <option value="">Seleccionar categoría...</option>
                                <option value="1">Sopas</option>
                                <option value="2">Entradas</option>
                                <option value="3">Platos de Fondo</option>
                                <option value="4">Bebidas</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Precio actual</label>
                            <div class="input-group">
                                <span class="input-group-text">S/</span>
                                <input type="number" step="0.01" class="form-control" id="campo-precioActual"
                                    placeholder="0.00">
                            </div>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" id="campo-descripcion" rows="3"
                                placeholder="Descripción del producto"></textarea>
                        </div>
                    </div>
                </div>

                <!-- ============================================================
                     BOTONES DE ACCIÓN
                     ============================================================ -->
                <div class="editar-footer">
                    <button type="button" class="btn btn-cancelar" onclick="history.back()">
                        <i class="fa-solid fa-xmark me-1"></i> Cancelar
                    </button>
                    <button type="button" class="btn btn-guardar" id="btn-abrir-modal-guardar">
                        <i class="fa-solid fa-floppy-disk me-1"></i> Guardar cambios
                    </button>
                </div>

            </form>
        </div>
        <!-- FIN editar-card -->

    </div>
    <!-- FIN editar-wrapper -->


    <!-- ============================================================
         MODAL DE CONFIRMACIÓN
         ============================================================ -->
    <div class="modal fade" id="modalConfirmarGuardar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fa-solid fa-triangle-exclamation me-2"></i>
                        Confirmar cambios
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body" id="modal-mensaje">
                    <!-- JS llenará este texto -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancelar" data-bs-dismiss="modal">
                        <i class="fa-solid fa-xmark me-1"></i> Cancelar
                    </button>
                    <button type="button" class="btn btn-guardar" id="btn-confirmar-guardar">
                        <i class="fa-solid fa-check me-1"></i> Sí, guardar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Tu JS -->
    <script src="../js/editar-producto.js"></script>
</body>

</html>
