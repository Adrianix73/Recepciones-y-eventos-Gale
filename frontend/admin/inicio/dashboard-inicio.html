<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../../shared/admin/dashboard.css">
    <link rel="icon" type="image/x-icon" href="../../img/favicon.ico">
</head>

<body data-page="inicio">

    <div class="topbar d-flex d-md-none justify-content-between align-items-center px-3 py-2">
        <span>Dashboard</span>
        <button class="hamburger" id="btn-hamburger" aria-label="Abrir menú">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>
    
    <div class="overlay" id="overlay"></div>

    <div class="d-flex">

        <aside class="sidebar" id="sidebar"></aside>

        <main class="flex-grow-1 p-4">

            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="#">Inicio</a></li>
                </ol>
            </nav>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0 titulo-seccion">INICIO</h4>
            </div>

            <!-- FILTROS -->
            <div class="d-flex gap-2 mb-3 flex-wrap">

                <!-- Buscador por nombre -->
                <div class="input-group busqueda">
                    <span class="input-group-text">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" class="form-control" id="buscador-reporte"
                        placeholder="Buscar algo..." autocomplete="off">
                    <button class="btn btn-limpiar-busqueda" type="button" id="btn-limpiar-busqueda" title="Limpiar">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

                <h2>Aquí irán los KPIs cards, gráficos...</h2>

            </div>

        </main>
        <!-- FIN main -->

    </div>

    <!-- Bootstrap JS (al final del body, necesario para componentes interactivos) -->
     <script src="../../shared/admin/auth-guard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../shared/admin/sidebar.js"></script>
    <script src="dashboard-reportes.js"></script>

</body>

</html>
