<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../dashboard.css">
    <link rel="icon" type="image/x-icon" href="../../img/favicon.ico">
</head>
<body data-page="usuarios">
 
    <div class="topbar d-flex d-md-none justify-content-between align-items-center px-3 py-2">  
    <span>Dashboard</span>  
    <button class="hamburger" id="btn-hamburger" aria-label="Abrir menú">  
        <i class="fa-solid fa-bars"></i>  
    </button>  
</div>
  
    <div class="overlay" id="overlay"></div>  
  
    <div class="d-flex">  
  
       <aside class="sidebar" id="sidebar"></aside> 
  
        <main class="flex-grow-1 p-4">  
            <!-- p-4 = padding de 4 unidades en todos los lados -->  
  
            <!-- BREADCRUMB con Bootstrap -->  
            <!-- Bootstrap tiene componente breadcrumb nativo -->  
            <nav aria-label="breadcrumb" class="mb-3">  
                <ol class="breadcrumb">  
                    <!-- breadcrumb-item = estilo de cada elemento -->  
                    <!-- active = el elemento actual (sin enlace) -->  
                    <li class="breadcrumb-item"><a href="#">Inicio</a></li>  
                    <li class="breadcrumb-item active">Empleados</li>  
                </ol>  
            </nav>  
  
            <!-- ============================================================  
                 CABECERA DE SECCIÓN  
                 Bootstrap: d-flex = flex | justify-content-between = extremos  
                 align-items-center = centrado vertical | mb-3 = margin bottom 3  
                 ============================================================ -->  
            <div class="d-flex justify-content-between align-items-center mb-3">  
                <h4 class="mb-0 titulo-seccion">REPORTE DE EMPLEADOS</h4>  
  
                <!-- BOTÓN BOOTSTRAP  
                     btn = clase base obligatoria  
                     btn-primary = color azul por defecto (lo sobreescribimos en CSS)  
                     Otros ejemplos: btn-secondary, btn-danger, btn-success, btn-outline-primary -->  
                <button class="btn btn-primary" onclick="abrirModalCrear()">  
                    <i class="fa-solid fa-plus me-1"></i> REGISTRAR  
                </button>  
            </div>  

            <section class="mb-3">
  <div class="d-flex flex-wrap align-items-center gap-2 gap-lg-3">
    <div class="d-flex flex-wrap gap-2">
      <button
        type="button"
        class="btn btn-filtro activo"
        onclick="aplicarFiltroEstado('habilitados', this)"
      >
        <i class="fa-solid fa-user-check"></i>
        Habilitados
      </button>

      <button
        type="button"
        class="btn btn-filtro"
        onclick="aplicarFiltroEstado('deshabilitados', this)"
      >
        <i class="fa-solid fa-user-slash"></i>
        Deshabilitados
      </button>

      <button
        type="button"
        class="btn btn-filtro"
        onclick="aplicarFiltroEstado('todos', this)"
      >
        <i class="fa-solid fa-users"></i>
        Todos
      </button>
    </div>

    <div class="busqueda flex-grow-1">
      <div class="input-group">
        <span class="input-group-text">
          <i class="fa-solid fa-magnifying-glass"></i>
        </span>

        <input
          type="text"
          id="buscador-usuario"
          class="form-control"
          placeholder="Buscar por nombre o apellido..."
          autocomplete="off"
        />

        <button
          type="button"
          id="btn-limpiar-busqueda-usuario"
          class="btn btn-limpiar-busqueda"
          aria-label="Limpiar búsqueda"
          title="Limpiar búsqueda"
        >
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>

    <div class="flex-grow-1 flex-md-grow-0" style="min-width: 220px;">
      <select
        id="filtro-rol"
        class="form-select"
        onchange="aplicarFiltroRol()"
      >
        <option value="">Todos los roles</option>
      </select>
    </div>
  </div>
</section>
  
            <div class="table-responsive">
    <table class="table table-hover table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Rol</th>
                <th>Último inicio de sesión</th>
                <th class="text-center">Estado</th>
                <th class="col-fecha-retiro d-none">Fecha/hora de retiro</th>
                <th class="text-center">Opciones</th>
            </tr>
        </thead>
        <tbody id="tabla-usuario">
            <!-- Vacío — JS lo llena automáticamente -->
        </tbody>
    </table>
</div>
  
        </main>  
        <!-- FIN main -->  
  
    </div>  
    <!-- FIN d-flex (layout principal) -->  

    MODAL EDITAR USUARIO
<div class="modal fade" id="modalEditarUsuario" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="fa-solid fa-pen-to-square me-2"></i>Editar Usuario
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <div class="modal-body">
        <p id="editar-usuario-subtitulo" class="text-muted mb-3">
          Modifique solo lo que necesite.
        </p>

        <form id="form-editar-usuario">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="editar-nombre-usuario" class="form-label">Nombre</label>
              <input type="text" id="editar-nombre-usuario" class="form-control" required />
            </div>

            <div class="col-md-6">
              <label for="editar-apellido-usuario" class="form-label">Apellido</label>
              <input type="text" id="editar-apellido-usuario" class="form-control" required />
            </div>

            <div class="col-12">
              <label for="editar-rol-usuario" class="form-label">Rol</label>
              <select id="editar-rol-usuario" class="form-select" required>
                <option value="">Seleccionar rol...</option>
                <option value="Admin">Admin</option>
                <option value="Cajero">Cajero</option>
                <option value="Mozo">Mozo</option>
              </select>
            </div>

            <div class="col-12">
              <p class="text-muted mb-1">
                Si desea modificar la contraseña, complete ambos campos.
              </p>
            </div>

            <div class="col-md-6">
              <label for="editar-clave-usuario" class="form-label">Nueva contraseña</label>
              <input type="password" id="editar-clave-usuario" class="form-control" />
            </div>

            <div class="col-md-6">
              <label for="editar-confirmar-clave-usuario" class="form-label">
                Confirmar nueva contraseña
              </label>
              <input
                type="password"
                id="editar-confirmar-clave-usuario"
                class="form-control"
              />
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-cancelar" data-bs-dismiss="modal">
          Cancelar
        </button>
        <button type="button" class="btn btn-primary" id="btn-guardar-edicion-usuario">
          Guardar cambios
        </button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CREAR USUARIO -->
<div class="modal fade" id="modalCrearUsuario" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fa-solid fa-user-plus me-2"></i> Registrar Usuario
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="form-crear-usuario">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="crear-nombre" placeholder="Nombre">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Apellido</label>
                            <input type="text" class="form-control" id="crear-apellido" placeholder="Apellido">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Rol</label>
                            <select class="form-select" id="crear-rol">
                                <option value="">Seleccionar rol...</option>
                                <option value="Admin">Admin</option>
                                <option value="Cajero">Cajero</option>
                                <option value="Mozo">Mozo</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="crear-clave" placeholder="Contraseña">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Confirmar contraseña</label>
                            <input type="password" class="form-control" id="crear-confirmar-clave" placeholder="Confirmar contraseña">
                        </div>
                    </div>
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-cancelar" data-bs-dismiss="modal">
                    <i class="fa-solid fa-xmark me-1"></i> Cancelar
                </button>
                <button type="button" class="btn btn-primary" id="btn-confirmar-crear">
                    <i class="fa-solid fa-check me-1"></i> Registrar
                </button>
            </div>

        </div>
    </div>
</div>
  
    <!--  Bootstrap JS (al final del body, necesario para componentes interactivos) -->  
    <script src="../auth-guard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../shared/sidebar.js"></script>
    <script src="dashboard-users.js"></script>

</body>
</html>
