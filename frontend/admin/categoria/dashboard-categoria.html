<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../dashboard.css">
</head>

<body data-page="categorias">

    <div class="topbar d-flex d-md-none justify-content-between align-items-center px-3 py-2">
        <span>Dashboard</span>
        <button class="hamburger" id="btn-hamburger" aria-label="Abrir menú">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>
    
    <div class="overlay" id="overlay"></div>

    <div class="d-flex">

        <aside class="sidebar" id="sidebar"></aside>

        <main class="flex-grow-1 p-4">

            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="#">Inicio</a></li>
                    <li class="breadcrumb-item active">Categorías</li>
                </ol>
            </nav>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0 titulo-seccion">REPORTE DE CATEGORÍAS</h4>

                <button class="btn btn-primary" onclick="abrirModalCrear()">
                    <i class="fa-solid fa-plus me-1"></i> REGISTRAR
                </button>
            </div>

            <!-- FILTROS -->
            <div class="d-flex gap-2 mb-3 flex-wrap">

                <!-- Buscador por nombre -->
                <div class="input-group busqueda">
                    <span class="input-group-text">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" class="form-control" id="buscador-categoria"
                        placeholder="Buscar categoría por nombre..." autocomplete="off">
                    <button class="btn btn-limpiar-busqueda" type="button" id="btn-limpiar-busqueda" title="Limpiar">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>

            </div>

            <div class="table-responsive">
                <table class="table table-hover table-bordered">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Categoría</th>
                            <th class="text-center">Opciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-categoria">
                        <!-- Vacío — JS lo llena automáticamente -->
                    </tbody>
                </table>
            </div>

        </main>
        <!-- FIN main -->

    </div>
    <!-- FIN d-flex (layout principal) -->

    <!-- MODAL EDITAR CATEGORÍA -->
<div class="modal fade" id="modalEditarCategoria" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fa-solid fa-pen-to-square me-2"></i> Editar Categoría
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <label class="form-label">Nuevo nombre</label>
                <input type="text" class="form-control" id="editar-nombre" placeholder="Nombre de la categoría">
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-cancelar" data-bs-dismiss="modal">
                    <i class="fa-solid fa-xmark me-1"></i> Cancelar
                </button>
                <button type="button" class="btn btn-primary" id="btn-si-editar-categoria">
                    <i class="fa-solid fa-check me-1"></i> Guardar cambios
                </button>
            </div>

        </div>
    </div>
</div>

    <!-- MODAL CREAR CATEGORÍA -->
    <div class="modal fade" id="modalCrearCategoria" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fa-solid fa-box-open me-2"></i> Registrar Categoría
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="form-crear-categoria">
                            
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="crear-nombre" placeholder="Nombre">                          
                            
                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-cancelar" data-bs-dismiss="modal">
                        <i class="fa-solid fa-xmark me-1"></i> Cancelar
                    </button>
                    <button type="button" class="btn btn-primary" id="btn-confirmar-crear">
                        <i class="fa-solid fa-check me-1"></i> Registrar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- MODAL ELIMINAR CATEGORÍA -->
    <div class="modal fade" id="modalEliminarCategoria" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fa-solid fa-triangle-exclamation me-2"></i> Retirar del menú
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modal-eliminar-mensaje"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancelar" data-bs-dismiss="modal">
                        <i class="fa-solid fa-xmark me-1"></i> Cancelar
                    </button>
                    <button type="button" class="btn btn-danger" id="btn-confirmar-eliminar">
                        <i class="fa-solid fa-trash me-1"></i> Sí, retirar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (al final del body, necesario para componentes interactivos) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../shared/sidebar.js"></script>
    <script src="dashboard-categoria.js"></script>

</body>

</html>
