spring.application.name=restobar-rdr

# CONEXION A MYSQL
spring.datasource.url=jdbc:mysql://localhost:3306/restobar_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Puerto del servidor
server.port=8080

# URL de la API
app.api.url =http://localhost:8080/

# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Esta linea de codigo desactiva temporalmente los bloqueos de los endpoints que puede causar la dependencia security
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration